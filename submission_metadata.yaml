ai_usage_summary: No AI tools were used for generating the core ranking logic or candidate
  evaluation. All statistical methods (Shapiro-Wilk, IQR, Shannon Entropy) were implemented
  manually via standard Python libraries (SciPy/Pandas).
methodology_summary: "Statistically rigorous ranking engine designed to prevent distribution\
  \ shift on unseen data. \n1. Automated Shapiro-Wilk testing picks the optimal memoryless\
  \ mathematical transform (Log, Sqrt, CubeRoot) per feature.\n2. Highly skewed red-flag\
  \ features (days inactive, suspicious endorsements) use IQR outlier elimination\
  \ (value > Q3 + 1.5*IQR) to effectively drop honeypots and ghosts.\n3. Surviving\
  \ candidates' features are converted to Percentile Ranks [0, 1].\n4. Weights are\
  \ dynamically calculated via Shannon Entropy, automatically giving higher weight\
  \ to features with higher variance/discriminative power.\nExecutes in ~10 seconds\
  \ on 100K candidates using vectorized pandas operations.\n"
